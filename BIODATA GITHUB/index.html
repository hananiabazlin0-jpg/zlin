<!DOCTYPE html>
<html lang="id">
<head>
    <title>Biodata Online - Soal 3</title>
</head>
<body>
    <h2>Form Input Biodata (GitHub Pages)</h2>
    <form id="biodataForm">
        Nama Lengkap: <input type="text" id="nama" required><br><br>
        Kelas: <input type="text" id="kelas" required><br><br>
        Alamat: <textarea id="alamat" required></textarea><br><br>
        Tanggal Lahir: <input type="date" id="tgl_lahir" required><br><br>
        <button type="button" onclick="tampilkanData()">Simpan</button>
    </form>

    <div id="hasil" style="margin-top: 20px; display: none;">
        <h3>Data Biodata:</h3>
        <p>Nama Lengkap: <span id="resNama"></span></p>
        <p>Kelas: <span id="resKelas"></span></p>
        <p>Alamat: <span id="resAlamat"></span></p>
        <p>Tanggal Lahir: <span id="resTgl"></span></p>
        <p>Umur: <span id="resUmur"></span></p>
    </div>

    <hr>
    <h3>Lampiran Tugas Soal 1 & 2</h3>
    <p>Hasil pengerjaan XAMPP dan Laragon telah berhasil diuji di lokal (lihat screenshot di repository).</p>

    <script>
        function tampilkanData() {
            const tglLahir = new Date(document.getElementById('tgl_lahir').value);
            const hariIni = new Date();
            
            // Logika hitung umur
            let umur = hariIni.getFullYear() - tglLahir.getFullYear();
            const bulan = hariIni.getMonth() - tglLahir.getMonth();
            if (bulan < 0 || (bulan === 0 && hariIni.getDate() < tglLahir.getDate())) {
                umur--;
            }

            // Tampilkan hasil
            document.getElementById('resNama').innerText = document.getElementById('nama').value;
            document.getElementById('resKelas').innerText = document.getElementById('kelas').value;
            document.getElementById('resAlamat').innerText = document.getElementById('alamat').value;
            document.getElementById('resTgl').innerText = document.getElementById('tgl_lahir').value;
            document.getElementById('resUmur').innerText = umur + " Tahun";
            document.getElementById('hasil').style.display = 'block';
        }
    </script>
</body>
</html>
